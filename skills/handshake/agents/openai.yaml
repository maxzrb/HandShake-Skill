name: HandShake
description: Project continuity workflow for Codex and Claude Code using one mandatory AI-facing STATUS log plus Chinese progress/version records, with built-in update guidance for the HandShake skill itself.
metadata:
  default_prompt: "Use HandShake proactively for non-trivial repository work, continuation, status checks, tool/device/environment switches, session closeout, and requests to update or upgrade the HandShake skill itself. Read AGENTS.md, CLAUDE.md when relevant, docs/codex/INDEX.md, and docs/codex/STATUS.md. Treat STATUS.md as the single AI-facing source of truth. For substantial work, update the current snapshot, append a YYYY-MM-DD HH:MM session log entry at the end of STATUS.md, append a matching Chinese progress entry to version/工作进度.md, update version/版本迭代记录.md only for version/release changes, and report git status. For installed skill updates, prefer update_installed_skill.py --latest --all --force unless the user provides a zip or source path."
