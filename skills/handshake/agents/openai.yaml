  short_description: "Maintain Codex/Claude Code handoff, device checks, and project records."
  default_prompt: "Use HandShake to initialize or inspect project handoff records, compare the current device/environment with prior records, continue work safely across Codex and Claude Code, update minimum closure records (including `version/工作进度.md` with a dated session entry), and refresh conditional records (including `version/版本迭代记录.md` when the version number changed) only when relevant."
